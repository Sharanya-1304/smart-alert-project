<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Smart Alert</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --accent: #667eea;
            --accent-2: #764ba2;
            --bg-1: #667eea;
            --bg-2: #764ba2;
        }

        body.user-theme {
            --accent: #f093fb;
            --accent-2: #f5576c;
            --bg-1: #f093fb;
            --bg-2: #f5576c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .reset-container {
            background: white;
            padding: 34px;
            border-radius: 15px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
        }
        .icon {
            width: 74px;
            height: 74px;
            border-radius: 50%;
            margin: 0 auto 16px;
            color: white;
            font-size: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
        }
        h1 { text-align: center; color: #2f2f2f; margin-bottom: 8px; }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e3e3e3;
            border-radius: 8px;
            font-size: 15px;
        }
        input:focus { outline: none; border-color: var(--accent); }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 44px; }
        .toggle-password {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: #64748b;
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
        }
        .toggle-password:hover { color: #334155; }
        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn:hover { opacity: 0.95; }
        #message { text-align: center; min-height: 24px; margin-top: 16px; }
        .back-link {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
        }
        .back-link a {
            color: var(--accent-2);
            font-weight: 600;
            text-decoration: none;
        }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body class="{{ 'user-theme' if account_type == 'user' else '' }}">
    <div class="reset-container">
        <div class="icon">
            <i class="fas fa-key"></i>
        </div>
        <h1>{{ account_type|capitalize }} Password Reset</h1>
        <p class="subtitle">Enter your account details and create a new password.</p>

        <form id="forgotPasswordForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>

            <div class="form-group">
                <label for="email">Registered Email</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label for="newPassword">New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="newPassword" minlength="8" required>
                    <button type="button" class="toggle-password" data-target="newPassword" aria-label="Show new password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" minlength="8" required>
                    <button type="button" class="toggle-password" data-target="confirmPassword" aria-label="Show confirm password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn"><i class="fas fa-rotate"></i> Reset Password</button>
        </form>

        <div id="message"></div>

        <div class="back-link">
            {% if account_type == 'admin' %}
            <a href="/admin-login">Back to Admin Login</a>
            {% else %}
            <a href="/user-login">Back to User Login</a>
            {% endif %}
        </div>
    </div>

    <script>
        const role = "{{ account_type }}";
        const form = document.getElementById('forgotPasswordForm');
        const message = document.getElementById('message');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const togglePasswordButtons = document.querySelectorAll('.toggle-password');

        togglePasswordButtons.forEach(function(button) {
            button.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const targetInput = document.getElementById(targetId);
                const show = targetInput.type === 'password';
                targetInput.type = show ? 'text' : 'password';
                this.innerHTML = `<i class="fas ${show ? 'fa-eye-slash' : 'fa-eye'}"></i>`;
                this.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
            });
        });

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (newPassword !== confirmPassword) {
                message.innerHTML = '<p style="color: red;">Passwords do not match</p>';
                return;
            }

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username,
                        email,
                        new_password: newPassword,
                        confirm_password: confirmPassword,
                        role
                    })
                });

                const data = await response.json();
                if (data.success) {
                    message.innerHTML = '<p style="color: green;">' + data.message + '</p>';
                    setTimeout(() => {
                        window.location.href = role === 'admin' ? '/admin-login' : '/user-login';
                    }, 1200);
                } else {
                    message.innerHTML = '<p style="color: red;">' + data.message + '</p>';
                }
            } catch (error) {
                message.innerHTML = '<p style="color: red;">Unable to reset password right now</p>';
            }
        });
    </script>
</body>
</html>
