<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - Smart Alert</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-container { background: white; padding: 40px; border-radius: 15px; max-width: 450px; width: 100%; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); }
        .icon-container { text-align: center; margin-bottom: 30px; }
        .icon { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 40px; }
        h1 { color: #333; font-size: 28px; margin-bottom: 10px; text-align: center; }
        .subtitle { color: #666; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; }
        input:focus { outline: none; border-color: #f5576c; }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 44px; }
        .toggle-password {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: #64748b;
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
        }
        .toggle-password:hover { color: #334155; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #f093fb, #f5576c); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(245, 87, 108, 0.4); }
        #message { text-align: center; margin: 20px 0; }
        .divider { margin: 20px 0; border: none; border-top: 1px solid #e0e0e0; }
        .links { text-align: center; margin-bottom: 20px; }
        .links p { color: #666; margin-bottom: 10px; }
        .links a { color: #f5576c; text-decoration: none; font-weight: 600; }
        .forgot-link { text-align: right; margin: -8px 0 18px; }
        .forgot-link a { color: #f5576c; text-decoration: none; font-size: 14px; font-weight: 600; }
        .forgot-link a:hover { text-decoration: underline; }
        .info-box { background: #fff0f5; padding: 15px; border-radius: 8px; border-left: 4px solid #f5576c; margin-top: 20px; }
        .info-box p { color: #333; font-size: 14px; margin: 0; }
        .info-box ul { color: #666; font-size: 13px; margin: 8px 0 0 20px; padding: 0; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="icon-container">
            <div class="icon"><i class="fas fa-user"></i></div>
            <h1>User Login</h1>
            <p class="subtitle">Access Your Dashboard</p>
        </div>

        <form id="userLoginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" required>
                    <button type="button" class="toggle-password" id="toggleLoginPassword" aria-label="Show password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="forgot-link">
                <a href="/forgot-password/user">Forgot password?</a>
            </div>

            <button type="submit" class="btn"><i class="fas fa-sign-in-alt"></i> User Login</button>
        </form>

        <div id="message"></div>

        <hr class="divider">

        <div class="links">
            <p>Don't have an account?</p>
            <a href="/register">Create Account</a>
        </div>

        <div class="links">
            <p>Are you an admin?</p>
            <a href="/admin-login">Admin Login</a> | <a href="/">Back Home</a>
        </div>

        <div class="info-box">
            <p><strong>Features:</strong></p>
            <ul>
                <li>Upload and analyze videos</li>
                <li>Real-time fire and fall detection</li>
                <li>Alert history and reports</li>
                <li>Caregiver notifications</li>
            </ul>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const toggleLoginPasswordButton = document.getElementById('toggleLoginPassword');

        toggleLoginPasswordButton.addEventListener('click', function() {
            const show = passwordInput.type === 'password';
            passwordInput.type = show ? 'text' : 'password';
            this.innerHTML = `<i class="fas ${show ? 'fa-eye-slash' : 'fa-eye'}"></i>`;
            this.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
        });

        document.getElementById('userLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, expected_role: 'user' })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    window.location.href = '/dashboard';
                } else {
                    document.getElementById('message').innerHTML = '<p style="color: red;">' + data.message + '</p>';
                }
            })
            .catch(e => {
                document.getElementById('message').innerHTML = '<p style="color: red;">Login error</p>';
            });
        });
    </script>
</body>
</html>
