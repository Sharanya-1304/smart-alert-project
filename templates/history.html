<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert History - Smart Alert</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-header {
            padding: 30px 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header i {
            font-size: 28px;
            color: #667eea;
        }

        .sidebar-header span {
            font-weight: 700;
            font-size: 20px;
            color: #333;
        }

        .sidebar-nav {
            padding: 20px 0;
        }

        .nav-item {
            padding: 15px 20px;
            color: #666;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }

        .nav-item i {
            font-size: 20px;
            width: 24px;
        }

        .nav-item:hover {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            border-left-color: #667eea;
        }

        .nav-item.active {
            background: rgba(102, 126, 234, 0.15);
            color: #667eea;
            border-left-color: #667eea;
            font-weight: 600;
        }

        .sidebar-footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            padding: 0 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            padding-top: 20px;
        }

        .logout-btn {
            width: 100%;
            padding: 12px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

        .main-content {
            margin-left: 280px;
            padding: 30px;
            min-height: 100vh;
        }

        .page-header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .page-header h1 {
            margin: 0 0 10px 0;
            font-size: 32px;
            color: #333;
        }

        .page-header p {
            margin: 0;
            color: #999;
        }

        .history-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-table th {
            background: #f9f9f9;
            padding: 20px;
            text-align: left;
            font-weight: 600;
            color: #666;
            border-bottom: 2px solid #e0e0e0;
            font-size: 14px;
        }

        .history-table td {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .history-table tr:hover {
            background: #f9f9f9;
        }

        .alert-badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-fire {
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
        }

        .badge-fall {
            background: rgba(255, 196, 0, 0.15);
            color: #ffc400;
        }

        .badge-proximity {
            background: rgba(255, 152, 0, 0.15);
            color: #ff9800;
        }

        .severity-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .severity-critical {
            background: rgba(244, 67, 54, 0.15);
            color: #f44336;
        }

        .severity-warning {
            background: rgba(255, 193, 7, 0.15);
            color: #ffc107;
        }

        .severity-info {
            background: rgba(33, 150, 243, 0.15);
            color: #2196f3;
        }

        .time-col {
            color: #999;
            font-size: 14px;
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .no-data i {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }

            .main-content {
                margin-left: 0;
            }

            .history-table {
                font-size: 14px;
            }

            .history-table th,
            .history-table td {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-shield-alt"></i>
            <span>Smart Alert</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="nav-item">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </a>
            <a href="/detection" class="nav-item">
                <i class="fas fa-camera"></i>
                <span>Start Detection</span>
            </a>
            <a href="/history" class="nav-item active">
                <i class="fas fa-history"></i>
                <span>Alert History</span>
            </a>
            <a href="/settings" class="nav-item">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="page-header">
            <h1>Alert History</h1>
            <p>Complete record of all detected alerts and events</p>
        </div>

        <div class="history-container">
            <table class="history-table" id="historyTable">
                <thead>
                    <tr>
                        <th>Type</th>
                        <th>Time</th>
                        <th>Severity</th>
                        <th>Description</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <tr>
                        <td colspan="4" class="no-data">
                            <i class="fas fa-inbox"></i>
                            <div>No alerts recorded yet</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadHistory() {
            try {
                const response = await fetch('/api/alerts?limit=100');
                const alerts = await response.json();
                
                const tbody = document.getElementById('historyBody');
                
                if (alerts.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="no-data"><i class="fas fa-inbox"></i><div>No alerts recorded yet</div></td></tr>';
                    return;
                }
                
                tbody.innerHTML = alerts.map(alert => {
                    const badgeClass = `badge-${alert.type}`;
                    const severityClass = `severity-${alert.severity.toLowerCase()}`;
                    
                    return `
                        <tr>
                            <td><span class="alert-badge ${badgeClass}">${alert.type.toUpperCase()}</span></td>
                            <td><span class="time-col">${alert.timestamp}</span></td>
                            <td><span class="severity-badge ${severityClass}">${alert.severity}</span></td>
                            <td>${alert.description || 'N/A'}</td>
                        </tr>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadHistory);
    </script>
</body>
</html>
