<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Log - Smart Alert Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #1a1a2e; min-height: 100vh; color: #fff; }
        .admin-sidebar { position: fixed; left: 0; top: 0; width: 260px; height: 100vh; background: linear-gradient(180deg, #16213e 0%, #0f3460 100%); box-shadow: 4px 0 15px rgba(0, 0, 0, 0.3); z-index: 100; }
        .admin-logo { padding: 25px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; gap: 12px; }
        .admin-logo i { font-size: 32px; color: #e94560; }
        .admin-logo span { font-size: 20px; font-weight: 700; color: #fff; }
        .admin-logo small { display: block; font-size: 11px; color: #94a3b8; font-weight: 400; }
        .admin-nav { padding: 20px 0; }
        .nav-section { padding: 10px 20px; font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }
        .admin-nav a { display: flex; align-items: center; gap: 12px; padding: 14px 25px; color: #94a3b8; text-decoration: none; transition: all 0.3s; border-left: 3px solid transparent; }
        .admin-nav a:hover, .admin-nav a.active { background: rgba(233, 69, 96, 0.1); color: #e94560; border-left-color: #e94560; }
        .admin-nav a i { width: 20px; font-size: 18px; }
        .main-content { margin-left: 260px; padding: 30px; min-height: 100vh; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .page-title h1 { font-size: 28px; font-weight: 700; color: #fff; }
        .page-title p { color: #64748b; font-size: 14px; }
        .card { background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02)); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 25px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card-title { font-size: 18px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 10px; }
        .card-title i { color: #e94560; }

        .activity-list { max-height: 700px; overflow-y: auto; }
        .activity-item { display: flex; gap: 15px; padding: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s; }
        .activity-item:hover { background: rgba(233, 69, 96, 0.05); }
        .activity-icon { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; }
        .activity-icon.login { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .activity-icon.alert { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .activity-icon.video { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .activity-icon.user { background: rgba(168, 85, 247, 0.2); color: #a855f7; }
        .activity-icon.admin { background: rgba(233, 69, 96, 0.2); color: #e94560; }
        .activity-content { flex: 1; }
        .activity-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .activity-user { font-weight: 600; color: #fff; }
        .activity-time { color: #64748b; font-size: 12px; }
        .activity-desc { color: #94a3b8; font-size: 14px; }
        .activity-type { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; background: rgba(255, 255, 255, 0.1); color: #fff; margin-right: 10px; }

        .filter-bar { display: flex; gap: 15px; margin-bottom: 20px; }
        .filter-input { padding: 10px 15px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.05); border-radius: 8px; color: #fff; font-size: 14px; }
        .filter-input:focus { outline: none; border-color: #e94560; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); color: #fff; }
    </style>
</head>
<body>
    <div class="admin-sidebar">
        <div class="admin-logo"><i class="fas fa-shield-alt"></i><div><span>Smart Alert</span><small>Admin Panel</small></div></div>
        <nav class="admin-nav">
            <div class="nav-section">Main</div>
            <a href="/admin"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
            <a href="/admin/users"><i class="fas fa-users"></i><span>User Management</span></a>
            <a href="/admin/alerts"><i class="fas fa-bell"></i><span>Alerts</span></a>
            <div class="nav-section">Analytics</div>
            <a href="/admin/analytics"><i class="fas fa-chart-line"></i><span>Analytics</span></a>
            <a href="/admin/activity" class="active"><i class="fas fa-history"></i><span>Activity Log</span></a>
            <div class="nav-section">System</div>
            <a href="/dashboard"><i class="fas fa-home"></i><span>Back to App</span></a>
            <a href="/logout"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <h1>Activity Log</h1>
                <p>Track all system activities and user actions</p>
            </div>
            <button class="btn btn-secondary" onclick="loadActivities()"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>

        <div class="card">
            <div class="card-header">
                <h3 class="card-title"><i class="fas fa-stream"></i> Recent Activities</h3>
            </div>
            <div class="filter-bar">
                <input type="text" class="filter-input" id="searchFilter" placeholder="Search activities..." style="flex: 1;" onkeyup="filterActivities()">
                <select class="filter-input" id="typeFilter" onchange="filterActivities()">
                    <option value="">All Types</option>
                    <option value="login">Login</option>
                    <option value="alert">Alert</option>
                    <option value="video">Video</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="activity-list" id="activityList">
                <div style="text-align: center; padding: 40px; color: #64748b;">Loading activities...</div>
            </div>
        </div>
    </div>

    <script>
        let allActivities = [];

        async function loadActivities() {
            try {
                const response = await fetch('/api/admin/activity-log?limit=100');
                allActivities = await response.json();
                renderActivities(allActivities);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function renderActivities(activities) {
            const container = document.getElementById('activityList');
            if (activities.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #64748b;">No activities found</div>';
                return;
            }

            container.innerHTML = activities.map(activity => {
                let iconClass = 'user';
                let icon = 'fa-user';

                if (activity.activity_type.includes('login')) { iconClass = 'login'; icon = 'fa-sign-in-alt'; }
                else if (activity.activity_type.includes('alert')) { iconClass = 'alert'; icon = 'fa-bell'; }
                else if (activity.activity_type.includes('video')) { iconClass = 'video'; icon = 'fa-video'; }
                else if (activity.activity_type.includes('admin')) { iconClass = 'admin'; icon = 'fa-user-shield'; }

                return `
                    <div class="activity-item">
                        <div class="activity-icon ${iconClass}"><i class="fas ${icon}"></i></div>
                        <div class="activity-content">
                            <div class="activity-header">
                                <span class="activity-user">${activity.username}</span>
                                <span class="activity-time">${activity.timestamp}</span>
                            </div>
                            <div class="activity-desc">
                                <span class="activity-type">${activity.activity_type}</span>
                                ${activity.description}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterActivities() {
            const search = document.getElementById('searchFilter').value.toLowerCase();
            const typeFilter = document.getElementById('typeFilter').value;

            const filtered = allActivities.filter(a => {
                const matchSearch = a.username.toLowerCase().includes(search) || a.description.toLowerCase().includes(search);
                const matchType = !typeFilter || a.activity_type.includes(typeFilter);
                return matchSearch && matchType;
            });

            renderActivities(filtered);
        }

        document.addEventListener('DOMContentLoaded', loadActivities);
    </script>
</body>
</html>
